name: Build and Release SQLite DB

on:
  push:
    branches: ["main"]
    paths:
      - vessels.sql
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build database
        run: sqlite3 vessels.db < vessels.sql

      - name: Generate tag
        id: tag
        run: echo "tag=v$(date -u +'%Y.%m.%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Create release
        uses: softprops/action-gh-release@v6
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: vessels.db
