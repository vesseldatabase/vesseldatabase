name: Build and Release SQLite DB

on:
  push:
    branches: [ "main" ]

jobs:
  build-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: [actions/checkout@v4](https://github.com)

      - name: Setup SQLite environment
        # Uses a Marketplace action to ensure sqlite3 is available
        uses: [ccorsi/setup-sqlite@v1](https://github.com/marketplace/actions/setup-sqlite-environment)
        with:
          sqlite-version: '3.44.0' # Specify your desired version
          sqlite-year: '2023'

      - name: Run SQL script to create DB
        run: |
          # The 'sqlite3' command is used to execute the .sql file
          # and create the 'my_database.sqlite' file
          sqlite3 vessels.db < vessels.sql

      - name: Create GitHub Release
        id: create_release
        # This action creates the release itself
        uses: [actions/create-release@v1](https://github.com)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Database Asset to Release
        id: upload-release-asset
        # This action uploads the generated file as a release asset
        uses: [actions/upload-release-asset@v1](https://github.com)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./vessels.db
          asset_name: vessels.db
          asset_content_type: application/octet-stream
